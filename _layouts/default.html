
<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{{page.title}}</title>
    <meta charset="utf-8">
    <meta name="description" content="The portfolio site of a programmer and web developer">
    <meta name="keywords" content="Andrew Clemens,Andy Clemens,Baltimore,programmer,developer">
    <link rel="stylesheet" href="/resources/css/style.css">
    <script src="https://code.jquery.com/jquery-3.3.1.js" integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60=" crossorigin="anonymous"></script>
<!-- Global site tag (gtag.js) - Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=UA-144679901-1"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'UA-144679901-1');
</script>

  </head>

  <body>
	  <div id="content" class="shadow" {% if page.section_id != -1 %}style="height: auto;"{% endif %}>
		  {% include index.html %}
	  </div>
	  <div style="height: 40px; margin: 0 20%; padding: 0;">
      <div id="stem" class="shadow" {% if page.section_id != -1 %}style="opacity: 1; left: {{page.section_id | times: 25 | plus: 12.5}}%; height: 45px;"{% endif %}></div>
	  </div>
	  <div id="section" class="shadow" {% if page.section_id != -1 %}style="opacity: 1; height: 250px;"{% endif %}>
		  {{content}}
	  </div>
      <div id="overlay">
          {% include overlay.html %}
      </div>
	  <script src="/resources/js/transitions.js"></script>
	  <script src="/resources/js/jquery-color.js"></script>
    <script src="/resources/js/keyboard.js"></script>
    <script src="/resources/js/scroll.js"></script>
    <script src="/resources/js/shadow.js"></script>
    <script src="/resources/js/overlay.js"></script>
	  <script>transition_open_section({{page.section_id}});</script>
  </body>
</html>
